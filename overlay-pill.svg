<svg xmlns="http://www.w3.org/2000/svg" width="302" height="66" viewBox="0 0 302 66" fill="none" role="img" aria-label="Sky Hub Overlay performance pill preview">
  <defs>
    <linearGradient id="pillFill" x1="46" y1="20" x2="256" y2="46" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#101010" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#1B1B1B" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="pillSheen" x1="47" y1="33" x2="255" y2="33" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#B8B8B8" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#B8B8B8" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="leftOrb" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(24.2 26.8) rotate(43.8) scale(20.5)">
      <stop stop-color="#C2C2C2" stop-opacity="0.26"/>
      <stop offset="0.58" stop-color="#2B2B2B" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#1D1D1D" stop-opacity="0.96"/>
    </radialGradient>
    <radialGradient id="rightOrb" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(266.4 27.4) rotate(43.8) scale(20.5)">
      <stop stop-color="#C2C2C2" stop-opacity="0.18"/>
      <stop offset="0.58" stop-color="#252525" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#1D1D1D" stop-opacity="0.94"/>
    </radialGradient>
    <filter id="drop" x="0" y="0" width="302" height="66" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#000000" flood-opacity="0.45"/>
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#A4A4A4" flood-opacity="0.14"/>
    </filter>
  </defs>

  <g filter="url(#drop)">
    <rect x="46" y="20" width="210" height="26" rx="13" fill="url(#pillFill)" stroke="#6A6A6A" stroke-opacity="0.34"/>
    <rect x="47" y="21" width="208" height="24" rx="12" fill="url(#pillSheen)" opacity="0.7"/>

    <circle cx="30" cy="33" r="17" fill="url(#leftOrb)" stroke="#B3B3B3" stroke-opacity="0.42"/>
    <circle cx="30" cy="33" r="19.5" stroke="#B7B7B7" stroke-opacity="0.78" stroke-width="2" stroke-dasharray="16 108" transform="rotate(-36 30 33)"/>
    <image href="/Assets/Overlay-Rocket.png" x="18.5" y="21.5" width="23" height="23"/>

    <circle cx="272" cy="33" r="17" fill="url(#rightOrb)" stroke="#B3B3B3" stroke-opacity="0.38"/>
    <text x="272" y="37.5" text-anchor="middle" fill="#E7E7E7" font-family="'Segoe UI Variable Text','Segoe UI',sans-serif" font-size="16" font-weight="600">&gt;</text>

    <text x="104" y="37" fill="#A6A6A6" font-family="'Segoe UI Variable Text','Segoe UI',sans-serif" font-size="11" letter-spacing="0.75">RAM:</text>
    <text x="132" y="37" fill="#ECECEC" font-family="'Segoe UI Variable Text','Segoe UI',sans-serif" font-size="11" font-weight="600">42%</text>
    <text x="164" y="37" fill="#A6A6A6" font-family="'Segoe UI Variable Text','Segoe UI',sans-serif" font-size="11" letter-spacing="0.75">CPU:</text>
    <text x="192" y="37" fill="#ECECEC" font-family="'Segoe UI Variable Text','Segoe UI',sans-serif" font-size="11" font-weight="600">28%</text>
  </g>
</svg>
